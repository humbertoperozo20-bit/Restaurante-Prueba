<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Plato 3D</title>
    
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; background-color: #f8f8f8; }
        h1 { color: #333; font-size: 20px; }
        /* Esto es el visor del plato */
        model-viewer { width: 100%; height: 70%; background-color: #ffffff; }
        /* Esto es el botón azul para ver en tu mesa */
        .boton-ar { padding: 15px 30px; background: #007AFF; color: white; border: none; border-radius: 50px; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <h1>🚀 Mi primer plato en 3D</h1>

    <model-viewer 
        src="plato.glb" 
        ios-src="plato.usdz" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        auto-rotate>
        
        <button slot="ar-button" class="boton-ar">
            🍽️ VER EN MI MESA
        </button>

    </model-viewer>

    <p>Usa el dedo para girarlo</p>

</body>
