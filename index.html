<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menú 3D Pro</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; }
        .wrapper { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; }
        .menu-bg { height: 100%; width: auto; max-width: 100%; object-fit: contain; }
        #btn-invisible {
            position: absolute;
            top: 28.5%;
            right: 8.5%;
            width: 21%;
            height: 11.5%;
            background: rgba(0, 0, 0, 0);
            border: none;
            cursor: pointer;
            z-index: 10;
            -webkit-tap-highlight-color: transparent;
        }
        model-viewer { display: none; }
    </style>
</head>
<body>
    <div class="wrapper">
        <img src="menu.jpg" class="menu-bg">
        <button id="btn-invisible" onclick="document.getElementById('visor').activateAR()"></button>
    </div>
    <model-viewer id="visor" src="plato.glb" ios-src="plato.usdz" ar ar-modes="quick-look scene-viewer"></model-viewer>
</body>
</html>
