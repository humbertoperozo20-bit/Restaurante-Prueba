<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Interactivo</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #ffffff; }
        .contenedor { position: relative; width: 100%; max-width: 500px; margin: 0 auto; }
        .imagen-fondo { width: 100%; display: block; }
        .boton-magico {
            position: absolute;
            top: 75px; 
            right: 25px; 
            width: 85px; 
            height: 85px; 
            background-color: rgba(255, 0, 0, 0.4); 
            border: none;
            cursor: pointer;
            z-index: 10;
            border-radius: 15px;
        }
        model-viewer { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>
    <div class="contenedor">
        <img src="menu.jpg" class="imagen-fondo">
        <button class="boton-magico" onclick="abrirAR()"></button>
    </div>
    <model-viewer id="visor" src="plato.glb" ios-src="plato.usdz" ar ar-modes="webxr scene-viewer quick-look"></model-viewer>
    <script>
        function abrirAR() { document.querySelector('#visor').activateAR(); }
    </script>
</body>
</html>
