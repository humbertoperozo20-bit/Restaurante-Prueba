<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body style="margin: 0; background-color: #ffffff; display: flex; flex-direction: column; align-items: center;">

    <h2 style="font-family: sans-serif; margin-top: 20px;">🥩 Mi Menú 3D</h2>

    <model-viewer 
        src="plato.glb" 
        ios-src="plato.usdz" 
        ar 
        ar-modes="quick-look webxr" 
        camera-controls 
        auto-rotate 
        style="width: 100vw; height: 80vh;">
        
        <button slot="ar-button" style="background-color: #007AFF; color: white; border: none; padding: 15px 25px; border-radius: 50px; font-size: 18px; font-weight: bold; position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
            📸 VER EN MI MESA
        </button>
        
    </model-viewer>

</body>
</html>
