<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; }
        .menu-container { position: relative; width: 100vw; height: 100vh; }
        .bg-menu { width: 100%; height: 100%; object-fit: contain; }
        
        #btn-invisible {
            position: absolute;
            top: 28.5%;
            right: 9%;
            width: 20%;
            height: 11%;
            background: rgba(255, 0, 0, 0);
            border: none;
            cursor: pointer;
            z-index: 10;
        }

        #visor-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
        }

        model-viewer { width: 100%; height: 90%; }

        .btn-ar-real {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            background: #007AFF;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 18px;
        }

        .btn-cerrar {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            background: #fff;
            border: none;
            border-radius: 50%;
            font-size: 24px;
            font-weight: bold;
            z-index: 101;
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <img src="menu.jpg" class="bg-menu">
        <button id="btn-invisible" onclick="abrirAR()"></button>
    </div>

    <div id="visor-overlay">
        <button class="btn-cerrar" onclick="cerrarAR()">×</button>
        <model-viewer src="plato.glb" ios-src="plato.usdz" ar ar-modes="quick-look webxr" camera-controls auto-rotate shadow-intensity="1">
            <button slot="ar-button" class="btn-ar-real">📸 VER EN REALIDAD AUMENTADA</button>
        </model-viewer>
    </div>

    <script>
        function abrirAR() { document.getElementById('visor-overlay').style.display = 'block'; }
        function cerrarAR() { document.getElementById('visor-overlay').style.display = 'none'; }
    </script>

</body>
</html>
